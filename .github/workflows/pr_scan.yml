name: PR automatic scan
on:
  pull_request:
  workflow_dispatch:

jobs:
  lint_test_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Install tools
        run: pip install flake8 pytest bandit safety
      - name: Run flake8
        run: |
          echo "Running flake8..."
          flake8 || true
      - name: Run pytest
        run: |
          echo "Running pytest..."
          pytest -q
      - name: Run bandit
        run: |
          echo "Running bandit..."
          bandit -r . -ll || true
      - name: Run safety
        run: |
          echo "Running safety..."
          if [ -f requirements.txt ]; then safety check --file=requirements.txt --full-report || true; else pip freeze > /tmp/reqs.txt && safety check --file=/tmp/reqs.txt --full-report || true; fi

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: python
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
